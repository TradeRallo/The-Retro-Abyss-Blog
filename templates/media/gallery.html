{% extends "layout.html" %}
{% load static %}

{% block content %}
<div class="main">
    <div class="posts">
        <div class="container-post">
            <div class="title"><h2>Gallery & Music</h2></div>
            <div class="content">
                <div class="media-grid">

                    <!-- Арты -->
                    <div class="media-card" onclick="openImage('{% static 'pictures/2004_3.png' %}')">
                        <img src="{% static 'pictures/2004_3.png' %}" alt="Art 2004.3">
                        <div class="media-info"><h3>2004.3</h3></div>
                    </div>
                    <div class="media-card" onclick="openImage('{% static 'pictures/2005_1.png' %}')">
                        <img src="{% static 'pictures/2005_1.png' %}" alt="Art 2005.1">
                        <div class="media-info"><h3>2005.1</h3></div>
                    </div>
                    <div class="media-card" onclick="openImage('{% static 'pictures/2005_2.png' %}')">
                        <img src="{% static 'pictures/2005_2.png' %}" alt="Art 2005.2">
                        <div class="media-info"><h3>2005.2</h3></div>
                    </div>

                    <!-- Музыка -->
                    <div class="media-card" onclick="openPlayer('{% static 'music/song1.mp3' %}', 'Song 1')">
                        <img src="{% static 'pictures/2004_3.png' %}" alt="Song 1">
                        <div class="media-info"><h3>Song 1</h3></div>
                    </div>
                    <div class="media-card" onclick="openPlayer('{% static 'music/song2.mp3' %}', 'Song 2')">
                        <img src="{% static 'pictures/2005_1.png' %}" alt="Song 2">
                        <div class="media-info"><h3>Song 2</h3></div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Стили прямо для галереи -->
<style>
.media-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: flex-start;
}

.media-card {
    width: 200px;
    background: #A3A3A3;
    border: 1px solid #000;
    box-shadow: 0px 3px 6px #444;
    cursor: pointer;
    transition: transform 0.2s;
}

.media-card:hover {
    transform: scale(1.05);
}

.media-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.media-info {
    padding: 5px;
    text-align: center;
}

.media-info h3 {
    margin: 0;
    font-size: 12px;
    color: #fff;
}
</style>

<!-- IMAGE OVERLAY -->
<div class="overlay image-viewer" id="imageOverlay" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:999;">
    <span class="close-btn" onclick="closeOverlay()" style="position:absolute; top:20px; right:30px; color:white; font-size:20px; cursor:pointer;">✖</span>
    <img id="viewerImage" style="max-width:80%; max-height:80%; border:4px solid white;">
</div>

<!-- PLAYER OVERLAY -->
<div class="overlay" id="playerOverlay" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:999;">
    <span class="close-btn" onclick="closeOverlay()" style="position:absolute; top:20px; right:30px; color:white; font-size:20px; cursor:pointer;">✖</span>
    <div class="player" style="background:#1e1e1e; color:white; padding:30px; width:500px; text-align:center; box-shadow:0 0 20px #000;">
        <h2 id="trackTitle"></h2>
        <audio id="audioPlayer"></audio>
        <input type="range" id="progressBar" class="progress" value="0" style="width:100%; margin:10px 0;">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div class="controls">
            <button onclick="seek(-10)">⏪ 10s</button>
            <button onclick="togglePlay()">▶ / ⏸</button>
            <button onclick="seek(10)">10s ⏩</button>
        </div>
        <input type="range" id="volumeControl" class="volume" min="0" max="1" step="0.01">
    </div>
</div>

<script>
// JS без изменений, как раньше
const audio = document.getElementById("audioPlayer");
const progress = document.getElementById("progressBar");
const volume = document.getElementById("volumeControl");
const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

volume.value = 0.7;
audio.volume = 0.7;

function openImage(src) {
    document.getElementById("viewerImage").src = src;
    document.getElementById("imageOverlay").style.display = "flex";
}

let currentTrack = null;

function openPlayer(src, title) {
    document.getElementById("trackTitle").innerText = title;
    document.getElementById("playerOverlay").style.display = "flex";

    // Если трек тот же самый, не делаем ничего
    if (currentTrack === src) {
        audio.play();
        return;
    }

    // Новый трек
    audio.pause();
    audio.src = src;
    audio.currentTime = 0; // стартуем с начала
    currentTrack = src;
    audio.play();
}

function closeOverlay() {
    document.querySelectorAll(".overlay").forEach(o => o.style.display = "none");
    audio.pause();
}

function togglePlay() {
    if(audio.paused) audio.play();
    else audio.pause();
}

function seek(seconds) {
    audio.currentTime += seconds;
}

audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100 || 0;
    currentTimeEl.textContent = formatTime(audio.currentTime);
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

function formatTime(seconds) {
    const mins = Math.floor(seconds/60);
    const secs = Math.floor(seconds%60);
    return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

audio.addEventListener("loadedmetadata", () => {
    durationEl.textContent = formatTime(audio.duration);
});
</script>
{% endblock %}
